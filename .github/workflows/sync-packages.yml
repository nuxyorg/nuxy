name: Sync packages to org repos

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/core/**'
      - 'packages/extension-sdk/**'
      - 'packages/ext-devserver/**'
      - 'packages/nxt/**'
      - 'extensions/calculator/**'
      - 'extensions/file-transfer/**'
      - 'extensions/gradient/**'
      - 'extensions/icon-browser/**'
      - 'extensions/icons-default/**'
      - 'extensions/notes/**'
      - 'extensions/nyaa/**'
      - 'extensions/settings/**'
      - 'extensions/shell/**'
      - 'extensions/theme-sakura/**'
      - 'extensions/ui-default/**'
      - 'scripts/sync-org-repo.mjs'
      - 'scripts/rewrite-workspace-deps.mjs'
      - 'scripts/npm-packages.mjs'

jobs:
  sync-npm-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify sync token
        env:
          TOKEN: ${{ secrets.NUXYORG_SYNC_TOKEN }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/nuxyorg/core)
          echo "GitHub API response for nuxyorg/core: $status"
          if [ "$status" = "401" ] || [ "$status" = "403" ]; then
            echo "NUXYORG_SYNC_TOKEN is invalid or lacks org access"
            exit 1
          fi

      - name: Sync npm toolchain packages (ordered)
        env:
          NUXYORG_SYNC_TOKEN: ${{ secrets.NUXYORG_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/sync-org-repo.mjs packages/core nuxyorg/core
          node scripts/sync-org-repo.mjs packages/extension-sdk nuxyorg/extension-sdk
          node scripts/sync-org-repo.mjs extensions/ui-default nuxyorg/ui-default
          node scripts/sync-org-repo.mjs packages/nxt nuxyorg/nxt
          node scripts/sync-org-repo.mjs packages/ext-devserver nuxyorg/ext-devserver

  sync-extensions:
    needs: sync-npm-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync extension mirrors
        env:
          NUXYORG_SYNC_TOKEN: ${{ secrets.NUXYORG_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/sync-org-repo.mjs extensions/calculator nuxyorg/ext-calculator
          node scripts/sync-org-repo.mjs extensions/file-transfer nuxyorg/ext-file-transfer
          node scripts/sync-org-repo.mjs extensions/gradient nuxyorg/ext-gradient
          node scripts/sync-org-repo.mjs extensions/icon-browser nuxyorg/ext-icon-browser
          node scripts/sync-org-repo.mjs extensions/icons-default nuxyorg/ext-icons-default
          node scripts/sync-org-repo.mjs extensions/notes nuxyorg/ext-notes
          node scripts/sync-org-repo.mjs extensions/nyaa nuxyorg/ext-nyaa
          node scripts/sync-org-repo.mjs extensions/settings nuxyorg/ext-settings
          node scripts/sync-org-repo.mjs extensions/shell nuxyorg/ext-shell
          node scripts/sync-org-repo.mjs extensions/theme-sakura nuxyorg/ext-theme-sakura
