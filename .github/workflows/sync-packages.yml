name: Sync packages to org repos

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/core/**'
      - 'packages/extension-sdk/**'
      - 'packages/ext-devserver/**'
      - 'packages/nxt/**'
      - 'extensions/calculator/**'
      - 'extensions/file-transfer/**'
      - 'extensions/gradient/**'
      - 'extensions/icon-browser/**'
      - 'extensions/icons-default/**'
      - 'extensions/notes/**'
      - 'extensions/nyaa/**'
      - 'extensions/settings/**'
      - 'extensions/shell/**'
      - 'extensions/theme-sakura/**'
      - 'extensions/ui-default/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - prefix: packages/core
            repo: nuxyorg/core
          - prefix: packages/extension-sdk
            repo: nuxyorg/extension-sdk
          - prefix: packages/ext-devserver
            repo: nuxyorg/ext-devserver
          - prefix: packages/nxt
            repo: nuxyorg/nxt
          - prefix: extensions/calculator
            repo: nuxyorg/ext-calculator
          - prefix: extensions/file-transfer
            repo: nuxyorg/ext-file-transfer
          - prefix: extensions/gradient
            repo: nuxyorg/ext-gradient
          - prefix: extensions/icon-browser
            repo: nuxyorg/ext-icon-browser
          - prefix: extensions/icons-default
            repo: nuxyorg/ext-icons-default
          - prefix: extensions/notes
            repo: nuxyorg/ext-notes
          - prefix: extensions/nyaa
            repo: nuxyorg/ext-nyaa
          - prefix: extensions/settings
            repo: nuxyorg/ext-settings
          - prefix: extensions/shell
            repo: nuxyorg/ext-shell
          - prefix: extensions/theme-sakura
            repo: nuxyorg/ext-theme-sakura
          - prefix: extensions/ui-default
            repo: nuxyorg/ui-default

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify token
        env:
          TOKEN: ${{ secrets.NUXYORG_SYNC_TOKEN }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/nuxyorg/core)
          echo "GitHub API response for nuxyorg/core: $status"

      - name: Ensure repo ${{ matrix.repo }} exists
        env:
          TOKEN: ${{ secrets.NUXYORG_SYNC_TOKEN }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/${{ matrix.repo }})
          if [ "$status" = "404" ]; then
            REPO_NAME=$(echo '${{ matrix.repo }}' | cut -d'/' -f2)
            curl -s -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              https://api.github.com/orgs/nuxyorg/repos \
              -d "{\"name\": \"$REPO_NAME\", \"private\": false, \"auto_init\": false}"
            echo "Created repo ${{ matrix.repo }}"
          else
            echo "Repo ${{ matrix.repo }} already exists (HTTP $status)"
          fi

      - name: Push subtree to ${{ matrix.repo }}
        env:
          TOKEN: ${{ secrets.NUXYORG_SYNC_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="sync-$(echo '${{ matrix.repo }}' | tr '/' '-')"
          git subtree split --prefix=${{ matrix.prefix }} -b "$BRANCH"
          git remote add target https://x-access-token:${TOKEN}@github.com/${{ matrix.repo }}.git
          git push target "$BRANCH":main --force
          git remote remove target
          git branch -D "$BRANCH"
