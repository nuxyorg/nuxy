name: CI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm spellcheck

      - run: pnpm test

      - run: pnpm -C src typecheck

      - run: pnpm -C src build

      - name: Verify electron-builder packaging (main)
        run: pnpm -C src package
